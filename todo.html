<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do It — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0F0F11;
      --surface:  #18181C;
      --border:   #2A2A32;
      --accent:   #C8F04A;
      --accent-d: #A8CC30;
      --text:     #EEEEF0;
      --muted:    #6B6B78;
      --danger:   #FF5C5C;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 580px;
      margin-bottom: 40px;
    }
    .eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      line-height: 1.05; color: var(--text);
    }
    h1 em { font-style: italic; color: var(--accent); }
    .subtitle { margin-top: 10px; font-size: 15px; color: var(--muted); }

    /* ── Stats bar ── */
    .stats {
      width: 100%; max-width: 580px;
      display: flex; gap: 8px; margin-bottom: 28px;
      font-size: 13px; color: var(--muted);
    }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px;
    }
    .stat strong { color: var(--text); font-weight: 600; margin-right: 4px; }

    /* ── Input area ── */
    .input-row {
      width: 100%; max-width: 580px;
      display: flex; gap: 10px; margin-bottom: 24px;
    }
    #taskInput {
      flex: 1; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px; padding: 14px 18px; outline: none;
      transition: border-color .2s;
    }
    #taskInput::placeholder { color: var(--muted); }
    #taskInput:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent); color: #0F0F11; border: none;
      border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; padding: 14px 22px;
      cursor: pointer; white-space: nowrap;
      transition: background .15s, transform .1s;
    }
    .btn-add:hover  { background: var(--accent-d); }
    .btn-add:active { transform: scale(.97); }

    /* ── Filters ── */
    .filters {
      width: 100%; max-width: 580px;
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .filter-btn {
      background: transparent; border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      padding: 7px 16px; cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0F0F11; }

    /* ── List ── */
    #taskList {
      width: 100%; max-width: 580px;
      list-style: none; display: flex; flex-direction: column; gap: 10px;
    }
    .task-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); display: flex; align-items: center;
      gap: 14px; padding: 16px 18px;
      transition: border-color .2s, opacity .2s;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { border-color: #3A3A44; }
    .task-item.done  { opacity: .5; }

    .check-btn {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, background .15s;
    }
    .task-item.done .check-btn { background: var(--accent); border-color: var(--accent); }
    .check-btn svg { display: none; }
    .task-item.done .check-btn svg { display: block; }

    .task-text { flex: 1; font-size: 15px; line-height: 1.4; word-break: break-word; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .btn-delete {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; border-radius: 6px; display: flex;
      transition: color .15s, background .15s;
    }
    .btn-delete:hover { color: var(--danger); background: rgba(255,92,92,.1); }

    /* ── Empty state ── */
    .empty {
      width: 100%; max-width: 580px;
      display: none; flex-direction: column; align-items: center;
      padding: 56px 0; color: var(--muted); gap: 12px;
    }
    .empty.show { display: flex; }
    .empty-icon { font-size: 40px; line-height: 1; }
    .empty p { font-size: 15px; }

    /* ── Bottom bar ── */
    .bottom-bar {
      width: 100%; max-width: 580px; margin-top: 24px;
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
    }
    .btn-ghost {
      background: transparent; border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 7px 16px; cursor: pointer;
      transition: border-color .15s, color .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn-ghost.danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ── History panel ── */
    .history-section {
      width: 100%; max-width: 580px; margin-top: 40px;
    }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .history-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem; color: var(--text);
    }
    .btn-clear-history {
      background: transparent; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      color: var(--muted); text-decoration: underline;
      transition: color .15s;
    }
    .btn-clear-history:hover { color: var(--danger); }

    #historyList {
      list-style: none; display: flex; flex-direction: column; gap: 8px;
    }
    .h-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      animation: slideIn .2s ease;
    }
    .h-badge {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; padding: 3px 8px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0; margin-top: 1px;
    }
    .h-badge.added    { background: rgba(200,240,74,.15);  color: var(--accent); }
    .h-badge.done     { background: rgba(100,200,100,.12); color: #7DE08A; }
    .h-badge.undone   { background: rgba(150,150,200,.12); color: #9999CC; }
    .h-badge.deleted  { background: rgba(255,92,92,.12);   color: var(--danger); }

    .h-body { flex: 1; min-width: 0; }
    .h-text { font-size: 14px; color: var(--text); word-break: break-word; }
    .h-time { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .history-empty {
      text-align: center; padding: 32px 0;
      font-size: 14px; color: var(--muted);
    }

    /* ── Download dropdown ── */
    .dl-wrap { position: relative; }
    .dl-menu {
      display: none; position: absolute; bottom: calc(100% + 8px); right: 0;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; overflow: hidden; min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 99;
    }
    .dl-menu.open { display: block; }
    .dl-opt {
      display: block; width: 100%; text-align: left; background: transparent;
      border: none; padding: 11px 16px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--text); cursor: pointer;
      transition: background .12s;
    }
    .dl-opt:hover { background: var(--border); }

    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .btn-add   { width: 100%; }
      .bottom-bar { flex-wrap: wrap; }
    }
    @media (prefers-reduced-motion: reduce) {
      .task-item, .h-item { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Task Manager</p>
  <h1>Get things <em>done.</em></h1>
  <p class="subtitle">Your tasks, nothing else.</p>
</header>

<div class="stats">
  <div class="stat"><strong id="statTotal">0</strong> total</div>
  <div class="stat"><strong id="statLeft">0</strong> remaining</div>
  <div class="stat"><strong id="statDone">0</strong> completed</div>
</div>

<div class="input-row">
  <input id="taskInput" type="text" placeholder="Add a new task…" maxlength="200" autocomplete="off"/>
  <button class="btn-add" onclick="addTask()">+ Add</button>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="done">Completed</button>
</div>

<ul id="taskList"></ul>

<div class="empty" id="emptyState">
  <span class="empty-icon">✦</span>
  <p id="emptyMsg">No tasks yet — add one above.</p>
</div>

<div class="bottom-bar">
  <button class="btn-ghost danger" onclick="clearDone()">Clear completed</button>
  <div class="dl-wrap">
    <button class="btn-ghost" id="dlToggle" onclick="toggleDlMenu()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Download ▾
    </button>
    <div class="dl-menu" id="dlMenu">
      <button class="dl-opt" onclick="download('txt')">Plain text (.txt)</button>
      <button class="dl-opt" onclick="download('csv')">Spreadsheet (.csv)</button>
      <button class="dl-opt" onclick="download('json')">JSON (.json)</button>
      <button class="dl-opt" onclick="download('md')">Markdown (.md)</button>
    </div>
  </div>
</div>

<!-- History -->
<div class="history-section">
  <div class="history-header">
    <span class="history-title">History</span>
    <button class="btn-clear-history" onclick="clearHistory()">Clear history</button>
  </div>
  <ul id="historyList"></ul>
  <div class="history-empty" id="historyEmpty">No activity yet.</div>
</div>

<script>
  let tasks   = JSON.parse(localStorage.getItem('doit-tasks')   || '[]');
  let history = JSON.parse(localStorage.getItem('doit-history') || '[]');
  let filter  = 'all';

  function save() {
    localStorage.setItem('doit-tasks',   JSON.stringify(tasks));
    localStorage.setItem('doit-history', JSON.stringify(history));
  }

  function logHistory(type, text) {
    history.unshift({ type, text, ts: Date.now() });
    if (history.length > 100) history = history.slice(0, 100);
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text  = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({ id: Date.now(), text, done: false });
    logHistory('added', text);
    save(); input.value = ''; render(); input.focus();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    logHistory(t.done ? 'done' : 'undone', t.text);
    save(); render();
  }

  function deleteTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) logHistory('deleted', t.text);
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearDone() {
    const removed = tasks.filter(t => t.done);
    removed.forEach(t => logHistory('deleted', t.text));
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function clearHistory() {
    history = []; save(); renderHistory();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.filter === f));
    render();
  }

  /* ── Download ── */
  function toggleDlMenu() {
    document.getElementById('dlMenu').classList.toggle('open');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.dl-wrap')) {
      document.getElementById('dlMenu').classList.remove('open');
    }
  });

  function download(fmt) {
    document.getElementById('dlMenu').classList.remove('open');
    const now   = new Date().toISOString().slice(0,10);
    let content = '', mime = 'text/plain', ext = fmt;

    if (fmt === 'txt') {
      const active = tasks.filter(t => !t.done);
      const done   = tasks.filter(t =>  t.done);
      content  = `DO IT — Task List\nExported: ${now}\n\n`;
      content += `── Active (${active.length}) ──\n`;
      active.forEach(t => content += `☐  ${t.text}\n`);
      content += `\n── Completed (${done.length}) ──\n`;
      done.forEach(t => content += `☑  ${t.text}\n`);
      if (history.length) {
        content += `\n── History ──\n`;
        history.forEach(h => {
          const d = new Date(h.ts).toLocaleString();
          content += `[${h.type.toUpperCase()}] ${d}  —  ${h.text}\n`;
        });
      }
    } else if (fmt === 'csv') {
      mime = 'text/csv';
      content = 'Status,Task,Created\n';
      tasks.forEach(t =>
        content += `"${t.done ? 'Done' : 'Active'}","${t.text.replace(/"/g,'""')}","${new Date(t.id).toLocaleString()}"\n`);
    } else if (fmt === 'json') {
      mime = 'application/json';
      content = JSON.stringify({ exportedAt: now, tasks, history }, null, 2);
    } else if (fmt === 'md') {
      mime = 'text/markdown'; ext = 'md';
      content  = `# Do It — Task List\n_Exported: ${now}_\n\n`;
      content += `## Active\n`;
      tasks.filter(t => !t.done).forEach(t => content += `- [ ] ${t.text}\n`);
      content += `\n## Completed\n`;
      tasks.filter(t =>  t.done).forEach(t => content += `- [x] ${t.text}\n`);
      if (history.length) {
        content += `\n## History\n| Action | Task | Time |\n|---|---|---|\n`;
        history.forEach(h =>
          content += `| ${h.type} | ${h.text} | ${new Date(h.ts).toLocaleString()} |\n`);
      }
    }

    const blob = new Blob([content], { type: mime });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: `tasks-${now}.${ext}`
    });
    document.body.appendChild(a); a.click(); a.remove();
  }

  /* ── Render tasks ── */
  function render() {
    const list  = document.getElementById('taskList');
    const empty = document.getElementById('emptyState');
    const msg   = document.getElementById('emptyMsg');

    const visible = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return  t.done;
      return true;
    });

    list.innerHTML = '';

    if (visible.length === 0) {
      empty.classList.add('show');
      msg.textContent =
        filter === 'done'   ? 'No completed tasks yet.' :
        filter === 'active' ? 'Nothing left to do — nice work!' :
                              'No tasks yet — add one above.';
    } else {
      empty.classList.remove('show');
      visible.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item' + (t.done ? ' done' : '');
        li.innerHTML = `
          <button class="check-btn" onclick="toggleDone(${t.id})" title="${t.done ? 'Mark active' : 'Mark done'}">
            <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
              <path d="M1 4L4 7.5L10 1" stroke="#0F0F11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="task-text">${escHtml(t.text)}</span>
          <button class="btn-delete" onclick="deleteTask(${t.id})" title="Delete">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M2 2l11 11M13 2L2 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        `;
        list.appendChild(li);
      });
    }

    const total = tasks.length, done = tasks.filter(t => t.done).length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statLeft').textContent  = total - done;
    document.getElementById('statDone').textContent  = done;

    renderHistory();
  }

  /* ── Render history ── */
  const BADGE = { added:'Added', done:'Completed', undone:'Reopened', deleted:'Deleted' };

  function renderHistory() {
    const ul = document.getElementById('historyList');
    const em = document.getElementById('historyEmpty');
    ul.innerHTML = '';
    if (!history.length) { em.style.display = 'block'; return; }
    em.style.display = 'none';
    history.forEach(h => {
      const li = document.createElement('li');
      li.className = 'h-item';
      li.innerHTML = `
        <span class="h-badge ${h.type}">${BADGE[h.type] || h.type}</span>
        <div class="h-body">
          <div class="h-text">${escHtml(h.text)}</div>
          <div class="h-time">${formatTime(h.ts)}</div>
        </div>
      `;
      ul.appendChild(li);
    });
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' })
         + ' · ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => setFilter(btn.dataset.filter)));

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
