<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do It — by @tushaaryok_</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F5F0E8;
      --paper:   #EDE8DF;
      --ink:     #1A1814;
      --mid:     #6B6560;
      --rule:    #C8C0B0;
      --accent:  #D4380D;
      --done-bg: #E8E4DC;
      --radius:  3px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 80px;
    }

    /* ── Masthead ── */
    .masthead {
      width: 100%;
      max-width: 640px;
      padding: 32px 0 20px;
      border-bottom: 3px solid var(--ink);
      margin-bottom: 0;
    }

    .masthead-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .issue-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .masthead-by {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--mid);
    }

    .masthead-by a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 18vw, 7.5rem);
      line-height: .9;
      letter-spacing: .02em;
      color: var(--ink);
    }

    h1 .red { color: var(--accent); }

    .masthead-rule {
      margin-top: 10px;
      height: 1px;
      background: var(--rule);
    }

    .masthead-sub {
      margin-top: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--mid);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── Stats bar ── */
    .stats {
      width: 100%; max-width: 640px;
      display: flex; gap: 0;
      margin: 20px 0;
      border: 1.5px solid var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }

    .stat {
      flex: 1;
      padding: 10px 14px;
      border-right: 1.5px solid var(--ink);
      color: var(--mid);
    }
    .stat:last-child { border-right: none; }
    .stat strong { display: block; font-size: 22px; color: var(--ink); font-family: 'Bebas Neue', sans-serif; letter-spacing:.03em; line-height:1; margin-bottom:2px; }

    /* ── Input area ── */
    .input-row {
      width: 100%; max-width: 640px;
      display: flex; gap: 0; margin-bottom: 20px;
      border: 1.5px solid var(--ink);
    }

    #taskInput {
      flex: 1; background: transparent; border: none;
      color: var(--ink); font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px; padding: 14px 16px; outline: none;
    }

    #taskInput::placeholder { color: var(--rule); font-style: italic; }

    .btn-add {
      background: var(--ink); color: var(--bg); border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: .06em;
      padding: 0 24px; cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    .btn-add:hover  { background: var(--accent); }
    .btn-add:active { opacity: .85; }

    /* ── Filters ── */
    .filters {
      width: 100%; max-width: 640px;
      display: flex; gap: 0; margin-bottom: 20px;
      border: 1.5px solid var(--ink);
    }

    .filter-btn {
      flex: 1; background: transparent; border: none;
      border-right: 1.5px solid var(--ink);
      color: var(--mid); font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
      padding: 10px 0; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { background: var(--paper); color: var(--ink); }
    .filter-btn.active { background: var(--ink); color: var(--bg); }

    /* ── List ── */
    #taskList {
      width: 100%; max-width: 640px;
      list-style: none; display: flex; flex-direction: column;
    }

    .task-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border: 1.5px solid var(--ink);
      border-top: none;
      background: var(--bg);
      transition: background .15s;
      animation: dropIn .18s ease;
    }

    .task-item:first-child { border-top: 1.5px solid var(--ink); }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { background: var(--paper); }
    .task-item.done  { background: var(--done-bg); }

    .check-btn {
      width: 20px; height: 20px;
      border: 1.5px solid var(--ink); background: transparent;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
      border-radius: 0;
    }

    .task-item.done .check-btn { background: var(--accent); border-color: var(--accent); }
    .check-btn svg { display: none; }
    .task-item.done .check-btn svg { display: block; }

    .task-text {
      flex: 1; font-size: 15px; line-height: 1.4;
      word-break: break-word; font-family: 'IBM Plex Sans', sans-serif;
    }

    .task-item.done .task-text {
      text-decoration: line-through; color: var(--mid);
    }

    .task-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; color: var(--rule);
      white-space: nowrap;
    }

    .btn-delete {
      background: transparent; border: none; cursor: pointer;
      color: var(--rule); padding: 4px;
      display: flex; transition: color .12s;
    }
    .btn-delete:hover { color: var(--accent); }

    /* ── Empty ── */
    .empty {
      width: 100%; max-width: 640px;
      display: none; flex-direction: column; align-items: center;
      padding: 48px 0; color: var(--mid); gap: 8px;
      border: 1.5px solid var(--ink); border-top: none;
    }
    .empty.show { display: flex; }
    .empty-icon { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--rule); }
    .empty p { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; }

    /* ── Bottom bar ── */
    .bottom-bar {
      width: 100%; max-width: 640px; margin-top: 16px;
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }

    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--ink);
      color: var(--mid); font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
      padding: 8px 14px; cursor: pointer;
      transition: background .12s, color .12s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-ghost:hover { background: var(--ink); color: var(--bg); }
    .btn-ghost.danger:hover { background: var(--accent); border-color: var(--accent); color: white; }

    /* ── Download dropdown ── */
    .dl-wrap { position: relative; }
    .dl-menu {
      display: none; position: absolute; bottom: calc(100% + 6px); right: 0;
      background: var(--bg); border: 1.5px solid var(--ink);
      min-width: 170px; z-index: 99;
      box-shadow: 4px 4px 0 var(--ink);
    }
    .dl-menu.open { display: block; }
    .dl-opt {
      display: block; width: 100%; text-align: left; background: transparent;
      border: none; border-bottom: 1px solid var(--rule);
      padding: 10px 14px; font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; letter-spacing:.04em; color: var(--ink); cursor: pointer;
      transition: background .1s;
    }
    .dl-opt:last-child { border-bottom: none; }
    .dl-opt:hover { background: var(--ink); color: var(--bg); }

    /* ── History ── */
    .history-section {
      width: 100%; max-width: 640px; margin-top: 40px;
    }

    .history-header {
      display: flex; align-items: baseline; justify-content: space-between;
      border-bottom: 3px solid var(--ink); padding-bottom: 8px; margin-bottom: 16px;
    }

    .history-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: .04em; color: var(--ink);
    }

    .btn-clear-history {
      background: transparent; border: none; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      color: var(--mid); text-decoration: underline; text-transform: uppercase;
      letter-spacing: .06em; transition: color .12s;
    }
    .btn-clear-history:hover { color: var(--accent); }

    #historyList { list-style: none; display: flex; flex-direction: column; }

    .h-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid var(--ink); border-top: none;
      animation: dropIn .18s ease;
    }
    .h-item:first-child { border-top: 1.5px solid var(--ink); }

    .h-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; padding: 3px 7px;
      white-space: nowrap; flex-shrink: 0; margin-top: 2px;
      border: 1px solid;
    }
    .h-badge.added   { border-color: var(--ink);   color: var(--ink);   background: transparent; }
    .h-badge.done    { border-color: #2a7a2a;       color: #2a7a2a;      background: transparent; }
    .h-badge.undone  { border-color: #7a5a2a;       color: #7a5a2a;      background: transparent; }
    .h-badge.deleted { border-color: var(--accent); color: var(--accent); background: transparent; }

    .h-body { flex: 1; min-width: 0; }
    .h-text { font-size: 14px; color: var(--ink); word-break: break-word; }
    .h-time { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--mid); margin-top: 3px; }

    .history-empty {
      text-align: center; padding: 32px 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--mid); letter-spacing: .06em; text-transform: uppercase;
      border: 1.5px solid var(--ink);
    }

    /* ── Footer ── */
    footer {
      width: 100%; max-width: 640px;
      margin-top: 48px;
      padding-top: 16px;
      border-top: 3px solid var(--ink);
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }

    .footer-copy {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--mid);
    }
    .footer-copy span { color: var(--accent); font-weight: 600; }

    .footer-links { display: flex; gap: 8px; }

    .footer-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--ink); text-decoration: none;
      border: 1.5px solid var(--ink); padding: 5px 12px;
      letter-spacing: .04em; text-transform: uppercase;
      transition: background .12s, color .12s;
    }
    .footer-link:hover { background: var(--ink); color: var(--bg); }

    @media (max-width: 480px) {
      .input-row { flex-direction: column; border: none; gap: 8px; }
      #taskInput { border: 1.5px solid var(--ink); }
      .btn-add { padding: 14px; border: 1.5px solid var(--ink); }
      .bottom-bar { flex-wrap: wrap; }
    }

    @media (prefers-reduced-motion: reduce) {
      .task-item, .h-item { animation: none; }
    }
  </style>
</head>
<body>

<!-- Masthead -->
<div class="masthead">
  <div class="masthead-top">
    <span class="issue-label">Personal Task Manager</span>
    <span class="masthead-by">by <a href="https://www.linkedin.com/in/tushaaryok" target="_blank">@tushaaryok_</a></span>
  </div>
  <h1>DO <span class="red">IT.</span></h1>
  <div class="masthead-rule"></div>
  <p class="masthead-sub">Your tasks — nothing else. No noise. No fluff.</p>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><strong id="statTotal">0</strong>Total</div>
  <div class="stat"><strong id="statLeft">0</strong>Remaining</div>
  <div class="stat"><strong id="statDone">0</strong>Completed</div>
</div>

<!-- Input -->
<div class="input-row">
  <input id="taskInput" type="text" placeholder="Write your next task…" maxlength="200" autocomplete="off"/>
  <button class="btn-add" onclick="addTask()">+ Add</button>
</div>

<!-- Filters -->
<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="done">Completed</button>
</div>

<!-- Task list -->
<ul id="taskList"></ul>

<div class="empty" id="emptyState">
  <span class="empty-icon">—</span>
  <p id="emptyMsg">No tasks yet. Add one above.</p>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button class="btn-ghost danger" onclick="clearDone()">✕ Clear completed</button>
  <div class="dl-wrap">
    <button class="btn-ghost" onclick="toggleDlMenu()">
      ↓ Download ▾
    </button>
    <div class="dl-menu" id="dlMenu">
      <button class="dl-opt" onclick="download('txt')">Plain text (.txt)</button>
      <button class="dl-opt" onclick="download('csv')">Spreadsheet (.csv)</button>
      <button class="dl-opt" onclick="download('json')">JSON (.json)</button>
      <button class="dl-opt" onclick="download('md')">Markdown (.md)</button>
    </div>
  </div>
</div>

<!-- History -->
<div class="history-section">
  <div class="history-header">
    <span class="history-title">Activity Log</span>
    <button class="btn-clear-history" onclick="clearHistory()">Clear all</button>
  </div>
  <ul id="historyList"></ul>
  <div class="history-empty" id="historyEmpty">No activity yet.</div>
</div>

<!-- Footer -->
<footer>
  <p class="footer-copy">© 2026 <span>@tushaaryok_</span> — All rights reserved.</p>
  <div class="footer-links">
    <a class="footer-link" href="https://github.com/Tushaaryok/Todo-app" target="_blank">★ GitHub</a>
    <a class="footer-link" href="https://www.linkedin.com/in/tushaaryok" target="_blank">in LinkedIn</a>
  </div>
</footer>

<script>
  let tasks   = JSON.parse(localStorage.getItem('doit-tasks')   || '[]');
  let history = JSON.parse(localStorage.getItem('doit-history') || '[]');
  let filter  = 'all';

  function save() {
    localStorage.setItem('doit-tasks',   JSON.stringify(tasks));
    localStorage.setItem('doit-history', JSON.stringify(history));
  }

  function logHistory(type, text) {
    history.unshift({ type, text, ts: Date.now() });
    if (history.length > 100) history = history.slice(0, 100);
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text  = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({ id: Date.now(), text, done: false });
    logHistory('added', text);
    save(); input.value = ''; render(); input.focus();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    logHistory(t.done ? 'done' : 'undone', t.text);
    save(); render();
  }

  function deleteTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) logHistory('deleted', t.text);
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearDone() {
    tasks.filter(t => t.done).forEach(t => logHistory('deleted', t.text));
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function clearHistory() {
    history = []; save(); renderHistory();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.filter === f));
    render();
  }

  function toggleDlMenu() {
    document.getElementById('dlMenu').classList.toggle('open');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.dl-wrap'))
      document.getElementById('dlMenu').classList.remove('open');
  });

  function download(fmt) {
    document.getElementById('dlMenu').classList.remove('open');
    const now = new Date().toISOString().slice(0,10);
    let content = '', mime = 'text/plain', ext = fmt;

    if (fmt === 'txt') {
      content  = `DO IT — Task List by @tushaaryok_\nExported: ${now}\n\n`;
      content += `── Active (${tasks.filter(t=>!t.done).length}) ──\n`;
      tasks.filter(t=>!t.done).forEach(t => content += `☐  ${t.text}\n`);
      content += `\n── Completed (${tasks.filter(t=>t.done).length}) ──\n`;
      tasks.filter(t=>t.done).forEach(t => content += `☑  ${t.text}\n`);
      if (history.length) {
        content += `\n── History ──\n`;
        history.forEach(h => content += `[${h.type.toUpperCase()}] ${new Date(h.ts).toLocaleString()}  —  ${h.text}\n`);
      }
    } else if (fmt === 'csv') {
      mime = 'text/csv';
      content = 'Status,Task,Created\n';
      tasks.forEach(t => content += `"${t.done?'Done':'Active'}","${t.text.replace(/"/g,'""')}","${new Date(t.id).toLocaleString()}"\n`);
    } else if (fmt === 'json') {
      mime = 'application/json';
      content = JSON.stringify({ exportedAt: now, author: '@tushaaryok_', tasks, history }, null, 2);
    } else if (fmt === 'md') {
      mime = 'text/markdown'; ext = 'md';
      content  = `# Do It — Task List\n_by [@tushaaryok_](https://linkedin.com/in/tushaaryok) | ${now}_\n\n## Active\n`;
      tasks.filter(t=>!t.done).forEach(t => content += `- [ ] ${t.text}\n`);
      content += `\n## Completed\n`;
      tasks.filter(t=>t.done).forEach(t => content += `- [x] ${t.text}\n`);
    }

    const blob = new Blob([content], { type: mime });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob), download: `tasks-${now}.${ext}`
    });
    document.body.appendChild(a); a.click(); a.remove();
  }

  function render() {
    const list  = document.getElementById('taskList');
    const empty = document.getElementById('emptyState');
    const msg   = document.getElementById('emptyMsg');

    const visible = tasks.filter(t =>
      filter === 'active' ? !t.done : filter === 'done' ? t.done : true);

    list.innerHTML = '';

    if (!visible.length) {
      empty.classList.add('show');
      msg.textContent =
        filter === 'done'   ? 'No completed tasks yet.' :
        filter === 'active' ? 'Nothing left to do — nice work!' :
                              'No tasks yet. Add one above.';
    } else {
      empty.classList.remove('show');
      visible.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item' + (t.done ? ' done' : '');
        const added = new Date(t.id).toLocaleDateString(undefined, { month:'short', day:'numeric' });
        li.innerHTML = `
          <button class="check-btn" onclick="toggleDone(${t.id})" title="${t.done?'Reopen':'Complete'}">
            <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
              <path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="task-text">${escHtml(t.text)}</span>
          <span class="task-meta">${added}</span>
          <button class="btn-delete" onclick="deleteTask(${t.id})" title="Delete">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
        `;
        list.appendChild(li);
      });
    }

    const total = tasks.length, done = tasks.filter(t=>t.done).length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statLeft').textContent  = total - done;
    document.getElementById('statDone').textContent  = done;
    renderHistory();
  }

  const BADGE = { added:'Added', done:'Done', undone:'Reopened', deleted:'Deleted' };

  function renderHistory() {
    const ul = document.getElementById('historyList');
    const em = document.getElementById('historyEmpty');
    ul.innerHTML = '';
    if (!history.length) { em.style.display = 'block'; return; }
    em.style.display = 'none';
    history.forEach(h => {
      const li = document.createElement('li');
      li.className = 'h-item';
      li.innerHTML = `
        <span class="h-badge ${h.type}">${BADGE[h.type]||h.type}</span>
        <div class="h-body">
          <div class="h-text">${escHtml(h.text)}</div>
          <div class="h-time">${formatTime(h.ts)}</div>
        </div>
      `;
      ul.appendChild(li);
    });
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})
         + ' · ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => setFilter(btn.dataset.filter)));

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
